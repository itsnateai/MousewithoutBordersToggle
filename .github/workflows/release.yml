name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        run: |
          $csproj = Get-Content MWBToggle.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>${{ steps.version.outputs.VERSION }}</Version>"
          Set-Content MWBToggle.csproj $csproj

      - name: Build self-contained
        run: dotnet publish -c Release --self-contained true -r win-x64 -p:PublishSingleFile=true

      - name: Prepare assets
        shell: bash
        run: |
          cp bin/Release/net8.0-windows/win-x64/publish/MWBToggle.exe MWBToggle.exe
          sha256sum MWBToggle.exe > SHA256SUMS

      - name: Extract release notes from CHANGELOG
        shell: bash
        run: |
          awk -v ver="${{ steps.version.outputs.VERSION }}" '
            /^## \[/ { if (p) exit; if (index($0, "[" ver "]")) p = 1; next }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md entry found for version ${{ steps.version.outputs.VERSION }} — release notes would be empty. Add a '## [${{ steps.version.outputs.VERSION }}]' section and re-tag."
            exit 1
          fi

          echo "=== Release notes preview ==="
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            MWBToggle.exe
            SHA256SUMS
