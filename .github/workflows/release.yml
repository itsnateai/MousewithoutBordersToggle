name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Per-ref group so different tags can still publish in parallel; a second push
# of the same tag (or a force-retag) queues behind the first run instead of
# double-creating the GitHub Release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update version in csproj
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $csproj = Get-Content MWBToggle.csproj -Raw
          $csproj = $csproj -replace '<Version>.*?</Version>', "<Version>$env:VERSION</Version>"
          Set-Content MWBToggle.csproj $csproj

      - name: Build self-contained
        run: dotnet publish -c Release --self-contained true -r win-x64 -p:PublishSingleFile=true

      - name: Prepare assets
        shell: bash
        run: |
          cp bin/Release/net8.0-windows/win-x64/publish/MWBToggle.exe MWBToggle.exe
          sha256sum MWBToggle.exe > SHA256SUMS

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          $version = $env:VERSION
          $content = Get-Content CHANGELOG.md -Raw
          # Capture the body between `## [<version>]` and the next `## [` (or end)
          $escaped = [regex]::Escape($version)
          $pattern = "(?ms)^##\s*\[$escaped\][^\n]*\n(.*?)(?=^##\s*\[|\z)"
          $m = [regex]::Match($content, $pattern)
          if ($m.Success) {
            $notes = $m.Groups[1].Value.Trim()
            Set-Content -Path RELEASE_NOTES.md -Value $notes -Encoding UTF8
            Write-Host "Extracted release notes for v$version ($($notes.Length) chars)"
          } else {
            # Fallback so the release still ships even if the changelog wasn't updated
            Set-Content -Path RELEASE_NOTES.md -Value "See [CHANGELOG.md](https://github.com/itsnateai/MousewithoutBordersToggle/blob/main/CHANGELOG.md) for release notes." -Encoding UTF8
            Write-Host "::warning::No CHANGELOG section found for v$version — using fallback body."
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          body_path: RELEASE_NOTES.md
          # append_body so the auto-generated "What's Changed" list appears BELOW
          # the human-written notes from CHANGELOG.md, not above or instead of them
          append_body: true
          generate_release_notes: true
          files: |
            MWBToggle.exe
            SHA256SUMS
